name: aidoctorassistant

services:
  web:
    build:
      context: .
      dockerfile: MedAssist.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
      # All other app config (DB, Ollama, Qdrant, SearXNG, OTEL, Marker, Books, Models)
      # lives in config/appsettings.shared.json, which is loaded *after* env vars and
      # therefore overrides them — so set those values there, not here.
    volumes:
      - medassist-models:/models
      - ./books/uniquebooks:/books/uniquebooks
      - ./books/mdFiles:/books/mdfiles
    depends_on:
      marker:
        condition: service_healthy
    networks:
      - medassist-net
      - pcc-net

  marker:
    build:
      context: ./docker/marker
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      - MARKER_LLM_ENDPOINT=http://ollama:11434/v1
      - MARKER_LLM_MODEL=qwen2.5vl:7b
      - BOOKS_MD_PATH=/books/mdfiles
    volumes:
      - ./books/uniquebooks:/books/uniquebooks
      - ./books/mdFiles:/books/mdfiles
      - marker-models:/root/.cache/datalab
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, json; r=urllib.request.urlopen('http://localhost:5002/health', timeout=5); d=json.loads(r.read()); exit(0 if d.get('models_loaded') else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - medassist-net
      - pcc-net

  # Shared infra is provided by the PersonalCommandCenter stack
  # (personalcommandcenter_default network), reached here by container name:
  #   postgres:5432, qdrant:6334 (gRPC), ollama:11434, searxng:8080,
  #   otel-collector:4317 (OTLP gRPC).
  # The observability backends (tempo/prometheus/grafana) and pgAdmin live in
  # the shared PCC stack too — aidoctor only runs the .NET app + marker.

volumes:
  medassist-models:
  marker-models:

networks:
  medassist-net:
    driver: bridge
  pcc-net:
    external: true
    name: personalcommandcenter_default
