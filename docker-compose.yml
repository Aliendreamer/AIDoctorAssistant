name: aidoctorassistant

services:
  web:
    build:
      context: .
      dockerfile: MedAssist.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
      # All other app config (DB, Ollama, Qdrant, SearXNG, OTEL, MinerU, Books, Models)
      # lives in config/appsettings.shared.json, which is loaded *after* env vars and
      # therefore overrides them — so set those values there, not here.
    volumes:
      # Shared ONNX model cache — the same external volume is mounted by the sibling
      # DndMcpAICsharpFun stack, so the cross-encoder reranker (ms-marco-MiniLM-L-6-v2)
      # is downloaded once and reused by both. Layout is one subdir per model:
      #   /models/multilingual-e5-large/  (MedAssist embedder)
      #   /models/ms-marco-MiniLM-L-6-v2/ (shared reranker)
      # Create + seed it once: see README "Shared ONNX model cache".
      - shared_onnx_models:/models
      - ./books/uniquebooks:/books/uniquebooks
      - ./books/mdFiles:/books/mdfiles
    networks:
      - medassist-net
      - pcc-net

  # Shared infra is provided by the PersonalCommandCenter stack
  # (personalcommandcenter_default network), reached here by container name:
  #   postgres:5432, qdrant:6334 (gRPC), ollama:11434, searxng:8080,
  #   mineru:8000 (OCR), otel-collector:4317 (OTLP gRPC).
  # OCR is the shared MinerU service (migrate-marker-to-mineru) — aidoctor no longer builds its own
  # GPU OCR container; it only runs the .NET app. The observability backends (tempo/prometheus/
  # grafana) and pgAdmin also live in the shared PCC stack.

volumes:
  # Externally-managed, shared with the DndMcpAICsharpFun stack. Create once with
  # `docker volume create shared_onnx_models` (see README). Not auto-created by compose.
  shared_onnx_models:
    external: true

networks:
  medassist-net:
    driver: bridge
    # The WSL2 egress path (a PPPoE-style tunnel) has a 1492-byte MTU, but Docker networks default
    # to 1500 — so full-size frames from containers get blackholed and large outbound downloads
    # (e.g. runtime model fetches) stall. Pin this network to the real path MTU. NOTE: this only
    # affects runtime container egress; the daemon-default MTU (/etc/docker/daemon.json "mtu": 1492)
    # is what fixes `docker build` downloads, since builds use the default bridge, not this network.
    driver_opts:
      com.docker.network.driver.mtu: "1492"
  pcc-net:
    external: true
    name: personalcommandcenter_default
