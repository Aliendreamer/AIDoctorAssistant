use_default_settings: true

general:
  instance_name: "MedAssist Search"
  privacypolicy_url: false
  contact_url: false
  enable_metrics: false

server:
  secret_key: "medassist-searxng-secret-change-in-production"
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"
  base_url: false

ui:
  static_use_hash: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    categories: general
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    categories: general
    disabled: false

  - name: bing
    engine: bing
    categories: general
    disabled: false

  # Disable everything else — domain filtering in the query handles scope
  - name: pubmed
    disabled: true

  - name: semantic scholar
    disabled: true

  - name: wikipedia
    disabled: true

  - name: wikidata
    disabled: true

  - name: arxiv
    disabled: true

categories_as_tabs:
  general:
    name: General
